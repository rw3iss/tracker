name: Publish @rw3iss/tracker

# Fire on `v*` tag push — release semantics. Pushing to main without
# a tag does NOT trigger a publish (avoids 409 conflicts when a doc
# commit lands on top of an already-published version).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@rw3iss'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: pnpm build

      # Use the cross-repo PAT for publishing — the auto GITHUB_TOKEN's
      # `packages: write` only covers packages owned by this repo, but
      # @rw3iss/tracker was originally connected to a different repo.
      # GH_PACKAGES_TOKEN is the same secret tracker-server's deploy
      # workflow uses to install from GitHub Packages.
      #
      # setup-node sets NPM_CONFIG_USERCONFIG=$RUNNER_TEMP/.npmrc, which
      # overrides project-local .npmrc. Write the auth token directly
      # into that file (token literal — substitution from NODE_AUTH_TOKEN
      # has been flaky for nested cwd) before publish.
      - name: Publish
        run: |
          npmrc_path="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          cat > "$npmrc_path" <<EOF
          @rw3iss:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${PACKAGES_TOKEN}
          always-auth=true
          EOF
          npm publish
        env:
          PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
