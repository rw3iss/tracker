name: Publish @rw3iss/tracker

# Fire on `v*` tag push — release semantics. Pushing to main without
# a tag does NOT trigger a publish (avoids 409 conflicts when a doc
# commit lands on top of an already-published version).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@rw3iss'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Publishes to the public npm registry. Add an `NPM_TOKEN` repo secret
      # (an npm automation token with publish rights on the @rw3iss scope).
      # publishConfig in package.json already sets access: public.
      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
